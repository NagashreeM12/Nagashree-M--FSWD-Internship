<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Responsive Hero Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #f4f6f9;
        }

        /* Hero Section */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 60px 10%;
            min-height: 100vh;
        }

        /* Left Content */
        .hero-content {
            flex: 1;
            padding-right: 40px;
        }

        .hero-content h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #222;
        }

        .hero-content p {
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
            color: #555;
        }

        .hero-content button {
            padding: 12px 25px;
            border: none;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s ease;
        }

        .hero-content button:hover {
            background-color: #0056b3;
        }

        /* Right Image */
        .hero-image {
            flex: 1;
            text-align: center;
        }

        .hero-image img {
            width: 100%;
            max-width: 500px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero {
                flex-direction: column;
                text-align: center;
                padding: 40px 20px;
            }

            .hero-content {
                padding-right: 0;
                margin-bottom: 30px;
            }

            .hero-content h1 {
                font-size: 32px;
            }

            .hero-content p {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <section class="hero">
        <div class="hero-content">
            <h1>Build Your Future With Us</h1>
            <p>
                We create modern, responsive and powerful websites 
                that help businesses grow faster in the digital world.
            </p>
            <button>Get Started</button>
        </div>

        <div class="hero-image">
            <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085" alt="Hero Image">
        </div>
    </section>

</body>
</html>
